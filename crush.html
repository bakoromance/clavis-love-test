<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>썸 / 짝사랑 성사율 계산하기 | CLAVIS</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" as="style" crossorigin
  href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" />
<style>
  :root{
    --bg:#f6eef0; --bg-2:#f1e6e9; --card:#ffffff; --card-bd:#ecdde1;
    --ink:#23171b; --ink-2:#6a5a60; --muted:#a8979d; --line:#ead7db;
    --rose:#d76b86; --rose-2:#e591a4; --rose-soft:rgba(215,107,134,.12);
    --sel:#241319; --sel-ink:#fbeef1;
    --btn:#241319; --btn-ink:#fbeef1; --btn-off:#ecdde1; --btn-off-ink:#b6a6ab;
    --shadow:0 22px 50px -28px rgba(80,30,45,.35);
    --serif:"Cormorant Garamond",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .app{position:relative;max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  .wm{font-size:14px;font-weight:800;color:var(--ink);display:inline-flex;align-items:baseline;gap:6px}
  .wm i{font-family:var(--serif);font-style:italic;font-weight:600;font-size:14px;letter-spacing:.14em;color:var(--rose)}
  .screen{display:none;flex:1;flex-direction:column}
  .screen.active{display:flex;animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;cursor:pointer;background:var(--btn);color:var(--btn-ink);font-family:inherit;font-weight:700;font-size:16px;padding:17px 24px;border-radius:14px;transition:transform .15s,background .2s,opacity .2s}
  .btn:hover{background:#34202a}
  .btn:active{transform:scale(.985)}
  .btn:disabled{background:var(--btn-off);color:var(--btn-off-ink);cursor:not-allowed}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-2);font-weight:600}
  .btn.ghost:hover{background:#fff}

  #intro{justify-content:center;align-items:center;text-align:center;padding:54px 28px}
  #intro .logo{height:30px;margin-bottom:30px;opacity:.92}
  #intro .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--rose);background:var(--rose-soft);border:1px solid rgba(215,107,134,.28);padding:7px 14px;border-radius:999px;margin-bottom:24px}
  #intro h1{font-size:36px;font-weight:800;letter-spacing:-.025em;line-height:1.2;margin-bottom:18px;text-align:center}
  #intro h1 .em{font-weight:800;color:var(--rose)}
  #intro .quote{font-family:var(--serif);font-style:italic;font-size:23px;margin:0 0 10px}
  #intro .sub{color:var(--muted);font-size:14.5px;margin-bottom:40px;line-height:1.7}
  #intro .cta{max-width:340px;width:100%}

  .qhead{position:sticky;top:0;z-index:5;background:var(--bg);padding:18px 22px 14px;box-shadow:0 8px 14px -12px rgba(80,30,45,.25)}
  .qhead-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .xclose{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--ink-2);font-size:13px;cursor:pointer;display:grid;place-items:center}
  .qhead-sub{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .qhead-sub .diag{font-size:12.5px;color:var(--ink-2);font-weight:600}
  .qhead-sub .step{font-size:11.5px;letter-spacing:.16em;color:var(--rose);font-weight:700}
  .progress-track{height:3px;background:var(--line);border-radius:999px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--rose-2));border-radius:999px;transition:width .45s cubic-bezier(.4,0,.2,1)}
  #quiz-body{padding:14px 22px 26px;flex:1}
  .qcard{animation:fade .35s ease both}
  .qnum{font-family:var(--serif);font-style:italic;font-size:32px;font-weight:600;color:var(--rose);line-height:1;margin-bottom:10px}
  .qtitle{font-size:23px;font-weight:800;line-height:1.36;letter-spacing:-.02em;margin-bottom:8px}
  .qhint{font-size:13px;color:var(--muted);margin-bottom:22px}
  .options{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--card-bd);color:var(--ink-2);padding:16px 18px;border-radius:14px;font-family:inherit;font-size:15px;font-weight:500;line-height:1.45;transition:border-color .16s,background .16s,color .16s,box-shadow .16s}
  .opt:hover{border-color:#e2c9cf;box-shadow:0 8px 18px -14px rgba(80,30,45,.3)}
  .opt .olabel{flex:1}
  .opt .oradio{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:1.8px solid #d8c4ca;position:relative;transition:.16s}
  .opt.selected{background:var(--sel);border-color:var(--sel);color:var(--sel-ink);box-shadow:var(--shadow)}
  .opt.selected .oradio{border-color:var(--rose-2)}
  .opt.selected .oradio::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--rose-2)}
  .qfoot{display:flex;gap:11px;margin-top:26px;padding-bottom:30px}
  .qfoot .btn{flex:1}.qfoot .btn.back{flex:0 0 84px}

  #result{padding:40px 24px 44px;text-align:center}
  #result .logo{height:24px;margin:0 auto 22px;display:block;opacity:.9}
  .gauge{position:relative;width:216px;height:216px;margin:0 auto 14px}
  .gauge svg{transform:rotate(-90deg);width:100%;height:100%}
  .gauge .track{fill:none;stroke:#ecdde1;stroke-width:10}
  .gauge .bar{fill:none;stroke:url(#g);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.4s cubic-bezier(.2,.7,.2,1)}
  .gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .pct{font-family:var(--serif);font-weight:600;font-size:62px;line-height:1;display:flex;align-items:baseline}
  .gauge .pct small{font-size:24px;color:var(--rose);font-weight:600;margin-left:2px}
  .gauge .pl{font-size:12.5px;color:var(--muted);margin-top:8px;letter-spacing:.05em;font-weight:600}
  #result .rtitle{font-size:23px;font-weight:800;line-height:1.45;letter-spacing:-.015em;margin:16px 0 20px}
  #result .rtitle .em{font-family:var(--serif);font-style:italic;color:var(--rose)}
  #result .rbody{text-align:left;background:#fff;border:1px solid var(--card-bd);border-radius:16px;padding:22px;color:var(--ink-2);font-size:14.5px;line-height:1.85;margin-bottom:24px;box-shadow:var(--shadow)}
  #result .rbody .rp{display:block;white-space:pre-line}
  #result .rbody .rp + .rp{margin-top:.4em}
  /* 성사율 설명글과 구분되는 별도 항목 — 반투명 밝은 회색 패널 */
  .type-card{--tc:var(--rose);background:rgba(106,90,96,.07);border:1px solid rgba(106,90,96,.14);border-radius:16px;padding:20px;margin-bottom:24px;text-align:center;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  .type-head{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
  .type-ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.55);border:1px solid rgba(106,90,96,.14);color:var(--tc)}
  .type-ic svg{width:14px;height:14px}
  .type-label{font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:700}
  .type-name-row{display:flex;align-items:baseline;justify-content:center;gap:9px;flex-wrap:wrap;margin-bottom:10px}
  .type-name{font-size:20px;font-weight:800;letter-spacing:-.01em;color:var(--tc)}
  .type-en{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--tc)}
  .type-desc{font-size:13.5px;color:var(--ink-2);line-height:1.75;white-space:pre-line}
  .type-body{margin-top:6px;padding-top:16px;border-top:1px solid rgba(106,90,96,.16);text-align:left;font-size:13.5px;line-height:1.85;color:var(--ink-2)}
  .type-body .rp{display:block;white-space:pre-line}
  .type-body .rp + .rp{margin-top:.4em}
  #result .cta-line{font-size:15px;font-weight:700;margin-bottom:14px}
  #result .actions{display:flex;flex-direction:column;gap:11px}
  #result .restart{margin-top:22px}
  #result .restart button{background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  #loading{justify-content:center;align-items:center;text-align:center;padding:54px 30px}
  .spinner{width:54px;height:54px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--rose);animation:spin 1s linear infinite;margin-bottom:28px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-title{font-size:21px;font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
  .load-step{font-size:14.5px;color:var(--ink-2);min-height:22px;transition:opacity .2s;margin-bottom:26px}
  .load-track{width:100%;max-width:280px;height:4px;background:var(--line);border-radius:999px;overflow:hidden;margin:0 auto 30px}
  .load-fill{height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--rose-2));border-radius:999px}
  .load-trust{max-width:330px;font-size:14px;line-height:1.75;color:var(--ink-2);background:#fff;border:1px solid var(--card-bd);border-radius:14px;padding:16px 20px}
  .load-trust b{color:var(--rose);font-weight:700}
  .footer{text-align:center;font-size:11px;color:var(--muted);letter-spacing:.25em;padding:14px 0 28px;opacity:.7}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(18px);background:var(--sel);color:var(--sel-ink);padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:70;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .sheet-overlay{position:fixed;inset:0;z-index:60;background:rgba(60,25,35,.4);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
  .sheet-overlay.show{display:flex;animation:fade .25s ease both}
  .sheet{width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;padding:14px 22px calc(26px + env(safe-area-inset-bottom));box-shadow:var(--shadow);animation:up .3s cubic-bezier(.2,.7,.2,1) both}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .grip{width:40px;height:4px;border-radius:999px;background:var(--line);margin:4px auto 18px}
  .sheet-title{text-align:center;font-size:16px;font-weight:700;margin-bottom:22px}
  .sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .share-item{display:flex;flex-direction:column;align-items:center;gap:9px;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--ink-2);font-size:12px;font-weight:600;padding:6px 2px}
  .share-ic{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;transition:transform .15s}
  .share-item:active .share-ic{transform:scale(.92)}
  .sheet-close{width:100%;background:var(--bg-2);border:1px solid var(--card-bd);color:var(--ink-2);font-family:inherit;font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <section id="intro" class="screen active">
    <img class="logo" src="assets/clavis-logo-black.png" alt="CLAVIS" />
    <span class="eyebrow">썸·짝사랑 시그널 데이터 진단</span>
    <h1>썸 / 짝사랑<br><span class="em">성사율 계산하기</span></h1>
    <p class="quote">“우리, 잘 될 수 있을까?”</p>
    <p class="sub">상대의 반응을 입력하면<br>연인으로 발전할 확률을 계산해 드려요.</p>
    <div class="cta"><button class="btn" onclick="startQuiz()">계산 시작&nbsp;&nbsp;→</button></div>
  </section>

  <section id="quiz" class="screen">
    <div class="qhead">
      <div class="qhead-top"><span class="wm">클래비스 <i>CLAVIS</i></span><button class="xclose" onclick="restart()">✕</button></div>
      <div class="qhead-sub"><span class="diag">썸 / 짝사랑 성사율 진단</span><span class="step">STEP <b id="cur">01</b> / <span id="total">26</span></span></div>
      <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
    </div>
    <div id="quiz-body"></div>
  </section>

  <section id="loading" class="screen">
    <div class="spinner"></div>
    <div class="load-title">성사 가능성을 분석 중입니다.</div>
    <div class="load-step" id="loadStep"></div>
    <div class="load-track"><div class="load-fill" id="loadFill"></div></div>
    <div class="load-trust">혼자 애태우지 말고,<br><b>결정적인 타이밍을 놓치기 전</b> 전문가의 조언을 받아보세요.</div>
  </section>

  <section id="result" class="screen">
    <img class="logo" src="assets/clavis-logo-black.png" alt="CLAVIS" />
    <div class="gauge">
      <svg viewBox="0 0 216 216"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e591a4"/><stop offset="100%" stop-color="#d76b86"/></linearGradient></defs>
        <circle class="track" cx="108" cy="108" r="96"/><circle class="bar" id="gaugeBar" cx="108" cy="108" r="96"/></svg>
      <div class="center"><div class="pct"><span id="pctNum">0</span><small>%</small></div><div class="pl">성사 가능성</div></div>
    </div>
    <h2 class="rtitle" id="rtitle"></h2>
    <div class="rbody" id="rbody"></div>
    <div class="type-card" id="typeCard" style="display:none">
      <div class="type-head">
        <span class="type-ic" id="typeIc"></span>
        <span class="type-label">썸 유형</span>
      </div>
      <div class="type-name-row">
        <span class="type-name" id="typeName"></span>
        <span class="type-en" id="typeEn"></span>
      </div>
      <div class="type-body" id="typeBody"></div>
    </div>
    <p class="cta-line" id="ctaLine"></p>
    <div class="actions">
      <a class="btn" id="consultBtn" target="_top">1:1 맞춤상담 신청하기</a>
      <button class="btn ghost" onclick="shareResult()">친구에게 결과 공유하기</button>
    </div>
    <div class="restart"><button onclick="restart()">다시 측정하기</button></div>
  </section>
  <div class="footer">CLAVIS</div>
</div>

<div class="sheet-overlay" id="shareSheet" onclick="if(event.target===this)closeShare()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title">결과 공유하기</div>
    <div class="sheet-grid">
      <button class="share-item" onclick="shareNative()"><span class="share-ic" style="background:#241319">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3v12M12 3l-4 4M12 3l4 4" stroke="#fbeef1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 12v6a2 2 0 002 2h10a2 2 0 002-2v-6" stroke="#fbeef1" stroke-width="2" stroke-linecap="round"/></svg>
      </span><span>공유하기</span></button>
      <button class="share-item" onclick="shareKakao()"><span class="share-ic" style="background:#FEE500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3.5C6.86 3.5 2.7 6.79 2.7 10.85c0 2.63 1.75 4.94 4.38 6.25-.19.69-.7 2.55-.8 2.95-.13.49.18.48.38.35.16-.1 2.5-1.7 3.51-2.39.6.09 1.21.13 1.83.13 5.14 0 9.3-3.29 9.3-7.35S17.14 3.5 12 3.5z"/></svg>
      </span><span>카카오톡</span></button>
      <button class="share-item" onclick="shareInstagram()"><span class="share-ic" style="background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5.5" stroke="#fff" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke="#fff" stroke-width="2"/><circle cx="17.3" cy="6.7" r="1.3" fill="#fff"/></svg>
      </span><span>인스타그램</span></button>
      <button class="share-item" onclick="copyLink()"><span class="share-ic" style="background:var(--bg-2);border:1px solid var(--card-bd)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 12a3 3 0 003 3h3a3 3 0 100-6h-1" stroke="#23171b" stroke-width="2" stroke-linecap="round"/><path d="M15 12a3 3 0 00-3-3H9a3 3 0 100 6h1" stroke="#23171b" stroke-width="2" stroke-linecap="round"/></svg>
      </span><span>링크 복사</span></button>
    </div>
    <button class="sheet-close" onclick="closeShare()">닫기</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const CONSULT_URL = "https://clavis.love/";
const KAKAO_JS_KEY = "";
/* Google 설문지 저장 (entry 번호 채우면 활성화) */
const FORM_ACTION = "";
const FORM_FIELDS = { name:"", phone:"", email:"", score:"", items:"" };

const MEMBER = (function(){
  const p = new URLSearchParams(location.search);
  return { uid:(p.get("uid")||"").trim(), name:(p.get("name")||"").trim(),
           phone:(p.get("phone")||"").trim(), email:(p.get("email")||"").trim() };
})();
window.addEventListener("message",(e)=>{ const d=e.data;
  if(d&&d.type==="clavis-member"){ ["uid","name","phone","email"].forEach(k=>{ if(d[k]) MEMBER[k]=String(d[k]).trim(); }); }});

/* v3 26문항. type: 없음=단일 / multiSum(합산,cap 상한) / multiDepth(최고단계만). opt 3번째 "solo"=배타선택. 점수는 정규화(하단 MINSUM/MAXSUM). */
const QUESTIONS = [
  { t:"썸 분위기가 생긴 뒤 얼마나 지났나요?", opts:[["썸이라 할 분위기는 없었다",-2,"FRIEND"],["1주 이내",0,"SCOUTING"],["2주 ~ 2개월",3],["2 ~ 4개월",1],["4 ~ 6개월",2],["6개월 이상",-1]]},
  { t:"최근 일주일 기준, 이전보다 연락·대화 분위기가 변했나요?", opts:[["비슷하게 유지 중",1],["더 좋아졌다",3],["상대 텐션이 낮아졌다",-2,"UNEVEN"],["대화가 끊겼다",-3],["빈도는 줄었지만 분위기는 나쁘지 않다",0,"SCOUTING"],["애초에 사적인 분위기는 없었다",-3,"FRIEND"]]},

/* 문항 점수: 단일=선택값 / multiDepth=선택 중 최고 / multiSum=합산(상한 cap) */
function qPoints(q,a){

  if(!a.length) return 0;

function closeness(){

function computeCrushType(pct){

  ["그대로 흐지부지","무응답"].forEach(t=>{ if(picked(qIdx("연락이 뜸해지면"),t)) cool++; });
  if(picked(qIdx("만남에 얼마나 적극적"),"제안하면 피하거나")) cool++;
  ["한두 번 있었다","가끔 만난다","자주 만난다"].forEach(t=>{ if(picked(qIdx("단둘이 만난 빈도"),t)) past++; });
  ["가벼운 접촉","장난스러운 터치","손잡기","뽀뽀","그 이상"].forEach(t=>{ if(picked(qIdx("스킨십"),t)) past++; });
  ["가끔씩 몇 번","틈틈이 있다","끊기면 어색할"].forEach(t=>{ if(picked(qIdx("반복되는 루틴"),t)) past++; });
  ["둘만의 농담","자주 반복되는 둘만의 코드","둘만의 별명"].forEach(t=>{ if(picked(qIdx("둘만 아는 농담"),t)) past++; });
  if(cool>=3 && past>=2 && pct<70) return "REKINDLE";
  // 3) 상대 신호는 좋은데 내 진도가 전부 멈춰 있으면 자기 검열형
  //    (셋 다 0이어야 하고, 상대 신호가 실제로 좋을 때만)

  if(picked(qIdx("플러팅"),"아직 시도해본 적 없다")) stalled++;
  if(picked(qIdx("스킨십"),"없다")) stalled++;
  if(stalled>=3 && pct>=60) return "HESITANT";

  //    친밀함과 이성적 진전은 별개이므로, 같은 장기 관계라도 여기서 유형이 완전히 갈린다.

    ["가끔씩 몇 번","틈틈이 있다","끊기면 어색할"].forEach(t=>{ if(picked(qIdx("반복되는 루틴"),t)) familiar++; });
    ["같은 집단에서 생긴","둘만의 농담","자주 반복되는","둘만의 별명"].forEach(t=>{ if(picked(qIdx("둘만 아는 농담"),t)) familiar++; });

  Object.keys(sc).forEach(k=>{ if(sc[k]>bs){ bs=sc[k]; best=k; tie=false; } else if(sc[k]===bs) tie=true; });

  //    성사율이 아주 높거나(80%+), 이성 진전이 충분히 쌓인 채 성사율도 받쳐줄 때(rom 4+ & 70%+).
  // 주관적 해석 항목만으로는 '확정 직전'이라 볼 수 없다. 객관 신호가 최소 2개는 있어야 한다.

  //    편안함/온도차/비중편차/자기검열/재점화는 '구도' 유형이라 성사율과 무관하게 그대로 둔다.

    if(isAlmost) return "ALMOST";
    if(pct>=65) return "RISING";
    // 접점 형성기와 탐색기는 같은 밴드라 태그 점수만으론 갈리지 않는다.
    // 실제로 쌓인 접점의 양으로 가른다 — 탐색기가 접점 형성기보다 가까운 단계.
    if(best==="ACCESS"||best==="SCOUTING") return closeness()<=7 ? "ACCESS" : "SCOUTING";
    return best;
  }
  return best;
}
const ICON_HEART='<svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.4-7-9.4A3.6 3.6 0 0 1 12 8.2a3.6 3.6 0 0 1 7 2.4c0 5-7 9.4-7 9.4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';
const ICON_HEART_FILL='<svg viewBox="0 0 24 24"><path d="M12 20s-7-4.4-7-9.4A3.6 3.6 0 0 1 12 8.2a3.6 3.6 0 0 1 7 2.4c0 5-7 9.4-7 9.4z" fill="currentColor"/></svg>';

function renderResult(pct, typeKey){
  const ti=TIERS.findIndex(t=>pct<=t.max);
  const T=TIERS[ti<0?TIERS.length-1:ti];
  const color=TIER_COLORS[ti<0?TIER_COLORS.length-1:ti];
  // 유형 카드
  const CT=CRUSH_TYPES[typeKey]||CRUSH_TYPES.SCOUTING;
  const typeCard=document.getElementById("typeCard");
  typeCard.style.setProperty("--tc", color);
  document.getElementById("typeIc").innerHTML = (typeKey==="ALMOST") ? ICON_HEART_FILL : ICON_HEART;
  document.getElementById("typeName").textContent=CT.name;
  document.getElementById("typeEn").textContent=CT.en;
  document.getElementById("typeBody").innerHTML=(CT.body||"").split("\n\n").map(function(p){ return '<span class="rp">'+p+'</span>'; }).join("");
  typeCard.style.display="block";
  document.getElementById("rtitle").innerHTML=`<span class="em">${T.title.replace(/\n/g,'<br>')}</span>`;
  document.getElementById("rbody").innerHTML=T.body.split("\n\n").map(function(p){ return '<span class="rp">'+p+'</span>'; }).join("");
  document.getElementById("ctaLine").textContent=T.cta;
  document.getElementById("consultBtn").href=CONSULT_URL;
  go("result");
  const bar=document.getElementById("gaugeBar"),r=96,c=2*Math.PI*r;
  bar.style.strokeDasharray=c; bar.style.strokeDashoffset=c;
  const numEl=document.getElementById("pctNum");
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ bar.style.strokeDashoffset=c*(1-pct/100); }));
  let dur=1400,start=performance.now();
  function tick(now){ const p=Math.min(1,(now-start)/dur),e=1-Math.pow(1-p,3); numEl.textContent=Math.round(pct*e); if(p<1) requestAnimationFrame(tick); else numEl.textContent=pct; }
  requestAnimationFrame(tick);
}
function showResult(){
  let raw=0; QUESTIONS.forEach((q,qi)=>{ raw+=qPoints(q,answers[qi]); });
  let pct=15+Math.round((raw-MINSUM)/(MAXSUM-MINSUM)*84); pct=Math.max(15,Math.min(99,pct));
  const typeKey=computeCrushType(pct);
  saveResult(`${pct}% / ${CRUSH_TYPES[typeKey].name}`, collectSelectedTexts());
  renderResult(pct, typeKey);
}
/* ★ 결과지 바로보기(미리보기): ?pct=74 / ?pct=74&type=FRIEND */
(function(){ const p=new URLSearchParams(location.search); if(!p.has("pct")&&!p.has("preview")) return;
  let v=parseInt(p.get("pct")); if(isNaN(v)) v=74; v=Math.max(15,Math.min(99,v));
  let t=(p.get("type")||"").toUpperCase(); if(!CRUSH_TYPES[t]) t = v>=85?"ALMOST":"SCOUTING";
  renderResult(v,t); })();
function restart(){ idx=0; QUESTIONS.forEach((q,i)=>answers[i]=isMulti(q)?[]:null); go("intro"); }

function shareData(){ const s=document.getElementById("pctNum").textContent; return { title:"썸 / 짝사랑 성사율 계산하기 | CLAVIS", text:`나의 썸·짝사랑 성사율은 ${s}%! 당신도 측정해보세요.`, url:location.href }; }
function shareResult(){ document.getElementById("shareSheet").classList.add("show"); document.body.style.overflow="hidden"; }
function closeShare(){ document.getElementById("shareSheet").classList.remove("show"); document.body.style.overflow=""; }
async function shareNative(){ const d=shareData(); if(navigator.share){ try{ await navigator.share(d); closeShare(); return; }catch(e){ if(e&&e.name==="AbortError") return; } } await copyToClipboard(`${d.text} ${d.url}`); toast("이 기기는 기본 공유를 지원하지 않아 링크를 복사했어요"); closeShare(); }
async function shareKakao(){ const d=shareData(); if(KAKAO_JS_KEY&&window.Kakao&&window.Kakao.isInitialized&&window.Kakao.isInitialized()){ try{ window.Kakao.Share.sendDefault({objectType:"text",text:`${d.title}\n${d.text}`,link:{mobileWebUrl:d.url,webUrl:d.url}}); closeShare(); return; }catch(e){} } await copyToClipboard(`${d.text} ${d.url}`); toast("링크를 복사했어요. 카카오톡에 붙여넣어 공유하세요"); closeShare(); }
async function shareInstagram(){ const d=shareData(); if(navigator.share){ try{ await navigator.share(d); closeShare(); return; }catch(e){ if(e&&e.name==="AbortError") return; } } await copyToClipboard(`${d.text} ${d.url}`); toast("링크를 복사했어요. 인스타그램 스토리·DM에 붙여넣어 공유하세요"); closeShare(); }
async function copyToClipboard(t){ try{ await navigator.clipboard.writeText(t); return true; }catch(e){ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); let ok=false; try{ ok=document.execCommand("copy"); }catch(_){ } document.body.removeChild(ta); return ok; } }
async function copyLink(){ const d=shareData(); const ok=await copyToClipboard(`${d.text} ${d.url}`); toast(ok?"링크가 복사되었습니다":"복사에 실패했습니다"); closeShare(); }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
(function loadKakao(){ if(!KAKAO_JS_KEY) return; const s=document.createElement("script"); s.src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"; s.crossOrigin="anonymous"; s.onload=()=>{ try{ if(window.Kakao&&!window.Kakao.isInitialized()) window.Kakao.init(KAKAO_JS_KEY); }catch(e){} }; document.head.appendChild(s); })();
