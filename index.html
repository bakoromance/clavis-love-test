<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>무료 연애상황 진단 | CLAVIS</title>
<link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" as="style" crossorigin
  href="https://fastly.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" />
<style>
  :root{
    --bg:#f3efe6; --card:#fffdf8; --card-bd:#e9e3d5; --line:#e4ddcd;
    --ink:#1c1a16; --ink-2:#5b574e; --muted:#9a958a;
    --gold:#b3984f; --serif:"Cormorant Garamond",serif;
    --shadow:0 18px 44px -26px rgba(60,48,20,.45);
    --shadow-hover:0 26px 55px -24px rgba(60,48,20,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;background:radial-gradient(680px 420px at 50% -8%,rgba(179,152,79,.13),transparent 62%);pointer-events:none}
  .app{position:relative;max-width:460px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;align-items:center;padding:0 22px}

  /* ===== header (완전 중앙정렬) ===== */
  .head{width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;padding:54px 0 28px}
  .head .logo{height:30px;margin-bottom:22px;opacity:.92}
  .head .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.18em;color:var(--gold);margin-bottom:15px}
  .head h1{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.4}
  .head h1 .em{font-family:var(--serif);font-style:italic;font-weight:600;color:var(--gold)}
  .head .acc{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-size:12.5px;font-weight:600;color:var(--gold);background:rgba(179,152,79,.1);border:1px solid rgba(179,152,79,.3);padding:7px 14px;border-radius:999px}
  .head .acc b{font-weight:800;font-size:13.5px}
  .head .acc .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block}
  .head p{color:var(--muted);font-size:13.5px;margin-top:11px}

  /* ===== cards ===== */
  .cards{width:100%;display:flex;flex-direction:column;gap:14px;padding:6px 0 34px}
  .card{display:flex;align-items:center;gap:15px;background:var(--card);border:1px solid var(--card-bd);
        border-radius:20px;padding:18px 18px;text-decoration:none;color:inherit;box-shadow:var(--shadow);
        transition:transform .18s cubic-bezier(.2,.7,.2,1),border-color .2s,box-shadow .2s}
  .card:hover{transform:translateY(-3px);border-color:var(--c);box-shadow:var(--shadow-hover)}
  .card:active{transform:translateY(-1px)}

  .ava{flex:0 0 auto;width:58px;height:58px;border-radius:50%;display:grid;place-items:center;
       background:linear-gradient(140deg,var(--g1),var(--g2));box-shadow:0 8px 18px -8px var(--g2),inset 0 1px 0 rgba(255,255,255,.35)}
  .ava svg{width:28px;height:28px}

  .meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .tag{font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--c)}
  .t{font-size:17px;font-weight:800;letter-spacing:-.01em}
  .s{font-size:12.5px;color:var(--muted);line-height:1.45}

  .chev{flex:0 0 auto;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:var(--c);
        background:color-mix(in srgb,var(--c) 12%,transparent);font-size:15px;font-weight:800;transition:transform .18s}
  .card:hover .chev{transform:translateX(3px)}

  .foot{margin-top:auto;text-align:center;font-size:11px;color:var(--muted);letter-spacing:.25em;padding:8px 0 30px;opacity:.65}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <img class="logo" src="assets/clavis-logo-black.png" alt="CLAVIS" />
    <div class="eyebrow">CLAVIS · 무료 연애상황 진단</div>
    <h1>그 사람의 마음,<br><span class="em">무엇이 궁금한가요?</span></h1>
    <div class="acc"><span class="dot"></span>누적 진단 데이터 기반 정확도 <b>98%</b></div>
    <p>궁금한 진단을 선택해 주세요.</p>
  </div>

  <div class="cards">
    <!-- 재회 (골드 · 열쇠) -->
    <a class="card" href="reunion.html" style="--c:#b3984f;--g1:#d4ba78;--g2:#b3984f">
      <span class="ava">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="4.2"/><path d="M10.9 10.9 L20 20"/><path d="M17.4 19.6l2.2-2.2"/><path d="M14.8 17l1.9-1.9"/>
        </svg>
      </span>
      <span class="meta"><span class="tag">REUNION</span><span class="t">재회 가능성 알아보기</span><span class="s">이별한 그 사람과, 다시 만날 수 있을까?</span></span>
      <span class="chev">›</span>
    </a>

    <!-- 관계 위험레벨 (더스티 로즈 · 균열 하트) -->
    <a class="card" href="risk.html" style="--c:#c2756f;--g1:#d7a09a;--g2:#bd6a64">
      <span class="ava">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20.3l-1.45-1.32C5.4 14.24 2 11.17 2 7.9 2 5.3 4.05 3.3 6.6 3.3c1.55 0 3.04.74 3.9 1.9"/>
          <path d="M13.5 5.2C14.36 4.04 15.85 3.3 17.4 3.3 19.95 3.3 22 5.3 22 7.9c0 3.27-3.4 6.34-8.55 11.08L12 20.3"/>
          <path d="M12.6 7.2l-1.8 3.4 2.6 1-1.8 3.2"/>
        </svg>
      </span>
      <span class="meta"><span class="tag">RELATIONSHIP</span><span class="t">관계 위험레벨 측정하기</span><span class="s">지금 우리 관계, 정말 괜찮은 걸까?</span></span>
      <span class="chev">›</span>
    </a>

    <!-- 썸/짝사랑 (로즈 · 설렘 하트) -->
    <a class="card" href="crush.html" style="--c:#d76b86;--g1:#ed9fb1;--g2:#d76b86">
      <span class="ava">
        <svg viewBox="0 0 24 24" fill="#fff">
          <path d="M12 1.8 Q13.1 10.9 22.2 12 Q13.1 13.1 12 22.2 Q10.9 13.1 1.8 12 Q10.9 10.9 12 1.8 Z"/>
          <path d="M19.2 3 Q19.6 4.55 21.1 5 Q19.6 5.45 19.2 7 Q18.8 5.45 17.3 5 Q18.8 4.55 19.2 3 Z"/>
        </svg>
      </span>
      <span class="meta"><span class="tag">SIGNAL</span><span class="t">썸 / 짝사랑 성사율 계산하기</span><span class="s">이 썸, 연인으로 발전할 수 있을까?</span></span>
      <span class="chev">›</span>
    </a>
  </div>

  <div class="foot">CLAVIS</div>
</div>
</body>
</html>
